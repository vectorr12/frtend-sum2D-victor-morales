<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario TechFix</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f4f6fb;
        color: #1f2937;
      }
      .logo {
        max-width: 180px;
        margin-bottom: 1.5rem;
      }
      .contenedor {
        text-align: center;
        padding: 2rem;
        background: white;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.1);
        border-radius: 16px;
        width: min(100%, 420px);
      }
      .boton {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.95rem 1.8rem;
        border: none;
        border-radius: 999px;
        background: #2563eb;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        text-decoration: none;
      }
      .boton:hover {
        background: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <div class="contenedor">
      <img src="images/imagen 1.webp" alt="Logo TechFix" class="logo" />
      <h1>Formulario TechFix</h1>
      <p>Haz clic en el botón para acceder al formulario de contacto o servicio técnico.</p>
      <a href="#" class="boton">Abrir formulario</a>
    </div>
  </body>
</html>
